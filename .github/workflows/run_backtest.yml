name: Backtest Screener

on:
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run backtest
        run: python backtest_screener.py

      - name: Upload results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: backtest-results
          path: backtest_results.csv
