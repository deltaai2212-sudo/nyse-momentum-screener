name: Explosive Mover Screener V2

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1-5'

jobs:
  run-screener-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance pandas pandas-ta tqdm numpy

      - name: Run screener v2
        run: |
          python screener_v2.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screener-v2-results
          path: screener_v2_results.csv
          retention-days: 7
