name: High-Precision Screener V3

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1-5'

jobs:
  run-screener-v3:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance pandas pandas-ta tqdm numpy

      - name: Run screener v3
        run: python screener_v3.py
